<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico do Celular</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Diagnóstico do Celular</h1>
  <p>Siga os testes passo a passo</p>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>
</header>

<main>

  <!-- TESTE TOUCH FULLSCREEN -->
  <button id="startTouchTest">Iniciar Teste de Touch</button>

  <div id="touch-fullscreen" class="hidden">
    <p id="touch-instruction">Passe o dedo por toda a tela</p>
    <div id="touch-grid"></div>
  </div>

  <!-- TESTE VIBRAÇÃO -->
  <section id="test-vibration" class="card hidden">
    <h2>📳 Teste de Vibração</h2>
    <button id="btn-vibrate">Testar Vibração</button>
    <button id="btn-confirm-vibration" class="hidden">✅ Vibrou</button>
    <p id="vibration-info"></p>
  </section>

</main>

<footer>
  <p>Ferramenta Web de Diagnóstico</p>
</footer>

<script src="app.js"></script>
</body>
</html>
