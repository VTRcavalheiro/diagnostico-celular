<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico do Celular</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Diagnóstico do Celular</h1>
  <p>Siga os testes passo a passo</p>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>
</header>

<main>

  <!-- TESTE 1: TOUCH -->
  <section id="step-touch" class="card">
    <h2>🖐️ Teste de Touch Screen</h2>
    <p>Passe o dedo por todos os quadrados</p>
    <div id="touch-grid"></div>
    <p id="touch-info"></p>
  </section>

  <!-- TESTE 2: VIBRAÇÃO -->
  <section id="step-vibration" class="card hidden">
    <h2>📳 Teste de Vibração</h2>
    <button id="btn-vibrate">Testar Vibração</button>
    <button id="btn-confirm-vibration" class="hidden">✅ Vibrou</button>
    <p id="vibration-info"></p>
  </section>

  <!-- TESTE 3: ORIENTAÇÃO -->
  <section id="step-orientation" class="card hidden">
    <h2>🧭 Teste de Orientação</h2>
    <button id="btn-orientation">Ativar Sensores</button>
    <p id="orientation-info"></p>
  </section>

</main>

<footer>
  <p>Ferramenta Web de Diagnóstico</p>
</footer>

<script src="app.js"></script>
</body>
</html>
