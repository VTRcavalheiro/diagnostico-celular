<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico do Celular</title>

  <!-- CSS correto -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Diagnóstico do Celular</h1>
  <p>Siga os testes passo a passo</p>

  <!-- Barra de progresso -->
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>
</header>

<main>

  <!-- TESTE TOUCH -->
  <section class="card" id="test-touch">
    <h2>🖐️ Teste de Touch Screen</h2>
    <p>Passe o dedo por todos os quadrados</p>
    <div id="touchGrid"></div>
    <p id="touchInfo"></p>
  </section>

  <!-- TESTE VIBRAÇÃO -->
  <section class="card hidden" id="test-vibration">
    <h2>📳 Teste de Vibração</h2>
    <button id="vibrateBtn">Testar Vibração</button>
    <button id="confirmVibration" class="hidden">✅ Vibrou</button>
    <p id="vibrationInfo"></p>
  </section>

  <!-- TESTE ORIENTAÇÃO -->
  <section class="card hidden" id="test-orientation">
    <h2>🧭 Teste de Orientação</h2>
    <p>Mova o celular</p>
    <button id="orientationBtn">Ativar Sensores</button>
    <p id="orientationInfo"></p>
  </section>

</main>

<footer>
  <p>Ferramenta Web de Diagnóstico</p>
</footer>

<!-- JS correto -->
<script src="app.js"></script>

</body>
</html>
