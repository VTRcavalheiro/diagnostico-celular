<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico do Celular</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Diagnóstico do Celular</h1>
  <p>Siga os testes passo a passo</p>
</header>

<main>

  <!-- TELA INICIAL -->
  <section class="card" id="start-screen">
    <button id="startBtn">▶ Iniciar Teste de Touch</button>
  </section>

  <!-- TOUCH FULLSCREEN -->
  <div id="touch-fullscreen" class="hidden">
    <div id="touch-instruction">Passe o dedo por TODA a tela</div>
    <div id="touch-grid"></div>
  </div>

  <!-- TESTE DE VIBRAÇÃO -->
  <section class="card hidden" id="vibration-screen">
    <h2>📳 Teste de Vibração</h2>
    <p>O celular deve vibrar ao iniciar o teste.</p>

    <button id="vibrateBtn">Testar Vibração</button>
    <button id="confirmVibration" class="hidden">✅ Vibrou</button>

    <p id="vibration-info"></p>
  </section>

</main>

<footer>
  Ferramenta Web de Diagnóstico
</footer>

<script src="app.js"></script>
</body>
</html>
