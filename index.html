<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico do Celular</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Diagnóstico do Celular</h1>
  <p>Siga os testes passo a passo</p>
</header>

<main>

  <!-- TESTE 1 - TOUCH -->
  <section class="card active" id="test-touch">
    <h2>🖐️ Teste de Touch Screen</h2>
    <p>Deslize o dedo por todos os quadrados</p>

    <div id="touchGrid"></div>

    <p id="touchStatus">
      Restantes: <strong><span id="remaining">0</span></strong>
    </p>
  </section>

  <!-- TESTE 2 - VIBRAÇÃO -->
  <section class="card hidden" id="test-vibration">
    <h2>📳 Teste de Vibração</h2>
    <button id="vibrateBtn">Iniciar teste de vibração</button>
    <p id="vibrationStatus">Aguardando ação...</p>
  </section>

  <!-- TESTE 3 - ORIENTAÇÃO -->
  <section class="card hidden" id="test-orientation">
    <h2>🧭 Teste de Orientação</h2>
    <button id="orientationBtn">Ativar sensores</button>
    <p id="orientationInfo">Aguardando movimento...</p>
  </section>

</main>

<footer>
  <p>Diagnóstico Web Guiado</p>
</footer>

<script src="app.js"></script>
</body>
</html>
