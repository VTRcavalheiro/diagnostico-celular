<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico do Celular</title>

  <!-- CSS corretamente carregado -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Diagnóstico do Celular</h1>
  <p>Ferramenta Web de Testes</p>
</header>

<main>

  <section class="card">
    <h2>📱 Informações do Dispositivo</h2>
    <div id="deviceInfo"></div>
  </section>

  <section class="card">
    <h2>🖐️ Teste de Touch Screen</h2>
    <div id="touchArea">Toque nesta área</div>
    <p id="touchStatus">Aguardando interação...</p>
  </section>

  <section class="card">
    <h2>🔋 Status da Bateria</h2>
    <div id="batteryInfo">Verificando...</div>
  </section>

  <section class="card">
    <h2>📳 Teste de Vibração</h2>
    <button id="vibrateBtn">Testar Vibração</button>
    <p id="vibrationStatus">Aguardando teste...</p>
  </section>

  <section class="card">
    <h2>🧭 Teste de Orientação</h2>
    <button id="orientationBtn">Ativar Sensores</button>
    <p id="orientationInfo">Sensores inativos</p>
  </section>

</main>

<footer>
  <p>Ferramenta Web de Diagnóstico</p>
</footer>

<!-- JS carregado corretamente E no final -->
<script src="app.js"></script>

</body>
</html>
