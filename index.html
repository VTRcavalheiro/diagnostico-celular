<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico do Celular</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Diagnóstico do Celular</h1>
  <p>Siga os testes passo a passo</p>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>
</header>

<main>

  <!-- BOTÃO INICIAL -->
  <section class="card" id="start-screen">
    <button onclick="startTouchTest()">
      ▶ Iniciar Teste de Touch
    </button>
  </section>

  <!-- TOUCH FULLSCREEN -->
  <div id="touch-fullscreen" class="hidden">
    <div id="touch-grid"></div>
  </div>

  <!-- VIBRAÇÃO -->
  <section class="card hidden" id="test-vibration">
    <h2>📳 Teste de Vibração</h2>
    <button onclick="runVibration()">Testar Vibração</button>
    <button id="confirmVibration" class="hidden" onclick="finishVibration()">
      ✅ Vibrou
    </button>
  </section>

</main>

<footer>
  <p>Ferramenta Web de Diagnóstico</p>
</footer>

<script src="app.js"></script>
</body>
</html>
